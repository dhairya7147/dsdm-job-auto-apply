spring.application.name=job-auto-apply
server.address=127.0.0.1

job-auto-apply.project-directory=${user.dir}
job-auto-apply.node-command=node
job-auto-apply.profile-path=profile.json
# Default for single manual review runs (browser stays open until you close it).
job-auto-apply.headless=false
job-auto-apply.review-timeout-ms=-1
# Batch runs use per-request overrides: headless=true, reviewTimeoutMs=5000
# Batch concurrency defaults to 10 in batch-apply-urls.js (BATCH_CONCURRENCY=10)
